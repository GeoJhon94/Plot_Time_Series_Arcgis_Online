                    response.features.forEach(feature => {
                    
                        const attrs = feature.attributes;
                    
                        const camposFechas = Object.keys(attrs)
                            .filter(key => key.startsWith('D'))
                            .sort((a, b) => parseInt(a.slice(1)) - parseInt(b.slice(1)));

                        const fechas = camposFechas;

                        const valoresOriginal = camposFechas.map(f => {
                            const num = parseFloat(attrs[f]?.toString().replace(',', '.'));
                            return isNaN(num) ? null : num;
                        });

                        const clustering = parseInt(attrs.CLUSTERING?.toString().replace(',', '.'));
                        const colorCluster = clusterColors[clustering?.toString()] || 'black';

                        traces.push({
                            x: fechas,
                            y: valoresOriginal,
                            name: `${attrs.code_text} (Cluster ${clustering})`,
                            type: 'scatter',
                            mode: 'lines+markers',
                            line: {
                                width: 3,
                                color: "red"
                            }
                        });
                    
                        let centroidesSeleccionados = null;
                    
                        if (clustering === -1) centroidesSeleccionados = centroids_1;
                        if (clustering === 0) centroidesSeleccionados = centroids0;
                        if (clustering === 1) centroidesSeleccionados = centroids1;
                        if (clustering === 2) centroidesSeleccionados = centroids2;
                        if (clustering === 3) centroidesSeleccionados = centroids3;
                        if (clustering === 4) centroidesSeleccionados = centroids4;
                        if (clustering === 5) centroidesSeleccionados = centroids5;
                        if (clustering === 6) centroidesSeleccionados = centroids6;
                        if (clustering === 7) centroidesSeleccionados = centroids7;
                        if (clustering === 8) centroidesSeleccionados = centroids8;
                        if (clustering === 9) centroidesSeleccionados = centroids9;
                    
                        if (centroidesSeleccionados && centroidesSeleccionados.length > 0) {
                            traces.push({
                                x: fechas,
                                y: centroidesSeleccionados,
                                name: `Centroide Cluster ${clustering}`,
                                type: 'scatter',
                                mode: 'lines',
                                line: {
                                    dash: 'dot',
                                    width: 4,
                                    color: colorCluster
                                },
                                opacity: 0.7
                            });
                        }
                    
                    });

                    const layout = {
                        title: {
                            text: 'Series temporales',
                            x: 0.5
                        },
                        xaxis: { title: 'Tiempo (D)' },
                        yaxis: { title: 'Desplazamiento (mm)' },
                        hovermode: 'closest',
                        legend: {
                            orientation: 'h',
                            x: 0.5,
                            xanchor: 'center',
                            y: 1.05,
                            yanchor: 'bottom'
                        }
                    };

                    Plotly.newPlot('grafico', traces, layout);
                })
                .catch(err => {
                    document.body.innerHTML = "Error de conexión.";
                });
        }
    </script>
</body>
</html>
